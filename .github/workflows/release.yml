name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script
        run: bash -n cch

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          install -m 0755 cch dist/cch
          install -m 0755 install.sh dist/install.sh
          tar -C dist -czf dist/cch-${GITHUB_REF_NAME}.tar.gz cch
          sha256sum dist/cch dist/install.sh dist/cch-${GITHUB_REF_NAME}.tar.gz > dist/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cch
            dist/install.sh
            dist/cch-${{ github.ref_name }}.tar.gz
            dist/SHA256SUMS
